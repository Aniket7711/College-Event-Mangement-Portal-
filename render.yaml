services:
  - type: web
    name: college-event-api
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false # User needs to provide this in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false # User needs to provide this in Render dashboard
      - key: NODE_ENV
        value: production
